services:
  postgres:
    image: postgres:alpine
    container_name: mooral-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mooral
    ports:
      - "5432:5432"
    networks:
      - mooral-network

  redis:
    image: redis:alpine
    container_name: mooral-redis
    ports:
      - "6379:6379"
    networks:
      - mooral-network

  mongo:
    image: mongo:latest
    container_name: mooral-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongo
      MONGO_INITDB_DATABASE: mooral
    ports:
      - "27017:27017"
    networks:
      - mooral-network

  rabbitmq:
    image: rabbitmq:management-alpine
    container_name: mooral-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: rabbitmq
      RABBITMQ_DEFAULT_PASS: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - mooral-network

  minio:
    image: minio/minio:latest
    container_name: mooral-minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - mooral-network

  prometheus:
    image: prom/prometheus:latest
    container_name: mooral-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - mooral-network

  grafana:
    image: grafana/grafana:latest
    container_name: mooral-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    networks:
      - mooral-network

networks:
  mooral-network:
    driver: bridge
